 <!DOCTYPE html>
<html>
<head>
  <title>Quiz</title>
</head>
<body>

<h2 id="question"></h2>
<div id="answers"></div>
<button onclick="nextQuestion()">Next</button>

<script>
const quiz = [
  {
    q: "1kΩ สีอะไร?",
    a: ["น้ำตาล-ดำ-แดง", "แดง-แดง-แดง"],
    c: 0
  },
  {
    q: "Ohm law?",
    a: ["V=IR", "P=IV"],
    c: 0
  }
];

let i = 0;

function load(){
  document.getElementById("question").innerText = quiz[i].q;
  let html="";
  quiz[i].a.forEach((ans,idx)=>{
    html += `<button onclick="check(${idx})">${ans}</button><br>`;
  });
  document.getElementById("answers").innerHTML = html;
}

function check(idx){
  alert(idx===quiz[i].c ? "ถูก!" : "ผิด!");
}

function nextQuestion(){
  i++;
  if(i<quiz.length) load();
  else alert("จบ");
}

load();
</script>

</body>
</html>
